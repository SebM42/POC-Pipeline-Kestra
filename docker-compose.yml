services:
  kestra-db:
    image: postgres:15
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - "./kestra-postgres-data/:/var/lib/postgresql/data"
  
  kestra:
    image: kestra/kestra:latest
    depends_on:
      - kestra-db
    container_name: kestra
    user: root
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://kestra-db:5432/kestra
      DATABASE_USERNAME: kestra
      DATABASE_PASSWORD: kestra
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "./tmp/:/tmp"
      - "./kestra_data/:/app/data"
    command: server local
    restart: unless-stopped